<div
  class="app-container"
  [class.theme-dark]="theme() === 'dark'"
  [class.theme-light]="theme() === 'light'"
>
  @if (isAuthenticated) {
    <mat-toolbar color="primary" class="app-bar">
      <button mat-icon-button (click)="toggleSidenav()" class="app-bar__menu">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="app-bar__brand" routerLink="/home" tabindex="0" role="link">
        <span class="app-bar__brandTitle">Boardroom</span>
        <span class="app-bar__brandTag">turn-based games</span>
      </div>

      <span class="app-bar-spacer"></span>

      <button
        mat-icon-button
        [matMenuTriggerFor]="profileMenu"
        class="avatar-button"
      >
        @if (avatarURL) {
          <img [src]="avatarURL" alt="Avatar" class="avatar-image" />
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </button>

      <mat-menu #profileMenu="matMenu">
        <div class="profile-menu-header">
          <h3>{{ profile().name }}</h3>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="changeTheme()">
          <mat-icon>{{ theme() === "light" ? "dark_mode" : "light_mode" }}</mat-icon>
          <span>Toggle Theme</span>
        </button>
        <button mat-menu-item (click)="openProfileDialog()">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <mat-sidenav-container class="layout">
      <mat-sidenav
        class="layout__sidenav"
        [mode]="'side'"
        [opened]="sidenavOpen()"
      >
        <nav class="nav">
          <a mat-list-item routerLink="/home" routerLinkActive="nav__active">
            <mat-icon class="nav__icon">dashboard</mat-icon>
            <span>Dashboard</span>
          </a>
          <a
            mat-list-item
            routerLink="/game-sessions"
            routerLinkActive="nav__active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            <mat-icon class="nav__icon">sports_esports</mat-icon>
            <span>Game Sessions</span>
          </a>
        </nav>
      </mat-sidenav>

      <mat-sidenav-content class="layout__content">
        <main class="app-main">
          <router-outlet></router-outlet>
        </main>
      </mat-sidenav-content>
    </mat-sidenav-container>
  } @else {
    <main class="app-main app-main--full-bleed">
      <router-outlet></router-outlet>
    </main>
  }

  @if (profileDialog()) {
  <div class="modal" (click)="profileDialog.set(false)">
    <div class="modal-dialog" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h2 mat-dialog-title>Profile</h2>
          <button mat-icon-button (click)="profileDialog.set(false)">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        <div class="modal-body">
          <p class="modal-subtitle">Enter your profile options here</p>
          <div class="avatar-preview">
            @if (avatarURL) {
            <img [src]="avatarURL" alt="Profile" class="profile-image" />
            } @else {
            <mat-icon class="avatar-icon-large">account_circle</mat-icon>
            }
          </div>
          <div class="file-input-container">
            <button
              mat-raised-button
              color="primary"
              [disabled]="profileIsUploading()"
            >
              <input
                type="file"
                accept="image/*"
                (change)="onAvatarChange($event)"
                [disabled]="profileIsUploading()"
                class="file-input"
              />
              @if (profileIsUploading()) {
              <ng-container>
                <mat-spinner diameter="20"></mat-spinner>
                <span>Uploading...</span>
              </ng-container>
              } @else {
              <span>Profile picture change</span>
              }
            </button>
          </div>
        </div>
        <div class="modal-footer">
          <button
            mat-button
            (click)="removeAvatar()"
            [disabled]="profileIsUploading() || !avatarURL"
          >
            Remove Profile Picture
          </button>
        </div>
      </div>
    </div>
  </div>
  }
</div>
