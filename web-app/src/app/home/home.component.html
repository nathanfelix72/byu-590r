<div class="home-container">
  <p>
    <a routerLink="/game-sessions">Game Sessions</a>
    &nbsp;|&nbsp;
    <a routerLink="/books">Books</a>
  </p>
  <h2>Here are your favorite books:</h2>
  <mat-card>
    <mat-card-content>
      <mat-list>
        @for (book of listOfBooks; track book) {
          <mat-list-item>{{ book }}</mat-list-item>
        }
      </mat-list>
    </mat-card-content>
  </mat-card>
</div>
