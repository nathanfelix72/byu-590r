name: BYU 590R Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: |
          cd web-app
          npm install

      - name: Run tests
        run: |
          cd web-app
          npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: |
          cd web-app
          npm run build

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: byu_590r_app_test
          MYSQL_USER: byu_user
          MYSQL_PASSWORD: byu_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none
          # Composer is installed by default; no curl to getcomposer.org

      - name: Install dependencies
        run: |
          cd backend
          set +e
          composer install --no-interaction --no-scripts --prefer-dist
          EXIT=$?
          set -e
          # If lock file is incompatible with PHP 8.3 (e.g. has Symfony 8), run update so Composer resolves for platform
          if [ $EXIT -ne 0 ]; then
            composer update --no-interaction --no-scripts --prefer-dist
          fi

      - name: Configure .env for tests
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate --no-interaction
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=byu_590r_app_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=byu_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=byu_password/' .env
          # Override with secrets if set
          if [ -n "${{ secrets.DB_DATABASE }}" ]; then sed -i "s/DB_DATABASE=.*/DB_DATABASE=${{ secrets.DB_DATABASE }}_test/" .env; fi
          if [ -n "${{ secrets.DB_USERNAME }}" ]; then sed -i "s/DB_USERNAME=.*/DB_USERNAME=${{ secrets.DB_USERNAME }}/" .env; fi
          if [ -n "${{ secrets.DB_PASSWORD }}" ]; then sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/" .env; fi

      - name: Run tests
        run: |
          cd backend
          php artisan test

  deploy-to-ec2:
    name: Deploy to EC2
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # Pushing .tf files to Git does not change AWS; only terraform apply (or your IaC pipeline) does.
      - name: Preflight — TCP to EC2 (SSH + HTTP)
        run: |
          set -e
          HOST="${{ secrets.EC2_HOST }}"
          if [ -z "$HOST" ]; then
            echo "::error::EC2_HOST secret is empty. Set it to the Elastic IP (terraform output ec2_host)."
            exit 1
          fi
          echo "Probing $HOST — port 22 (SSH) and 80 (HTTP), ~10s timeout each..."
          ok22=false
          ok80=false
          timeout 10 bash -c "echo >/dev/tcp/$HOST/22" && ok22=true || true
          timeout 10 bash -c "echo >/dev/tcp/$HOST/80" && ok80=true || true
          if [ "$ok22" = true ]; then echo "Port 22: reachable"; else echo "Port 22: NOT reachable"; fi
          if [ "$ok80" = true ]; then echo "Port 80: reachable"; else echo "Port 80: NOT reachable"; fi
          if [ "$ok22" != true ]; then
            echo ""
            echo "SSH preflight failed. Typical causes:"
            echo "  - EC2_HOST in GitHub does not match the current Elastic IP (update from: terraform output ec2_host)."
            echo "  - Instance stopped or EIP no longer attached to that instance."
            echo "  - Security group does not allow 22 from the internet (run terraform apply if you changed .tf locally)."
            exit 1
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Deploy backend
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "sudo mkdir -p /var/www/html/api && sudo chown -R ubuntu:ubuntu /var/www/html/api"
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
            backend/ ubuntu@${{ secrets.EC2_HOST }}:/var/www/html/api/

          # If EC2 has no Composer (user_data failed or instance not from Terraform), provide composer.phar from runner
          for i in 1 2 3; do
            curl -sS -L --connect-timeout 60 -o composer.phar https://getcomposer.org/download/latest-stable/composer.phar && break
            [ $i -eq 3 ] && exit 1
            echo "Retry $i/3 in 10s..." && sleep 10
          done
          scp -o StrictHostKeyChecking=no composer.phar ubuntu@${{ secrets.EC2_HOST }}:/var/www/html/api/

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'REMOTE'
          set -e
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          cd /var/www/html/api

          # Resolve PHP (non-interactive SSH often has minimal PATH)
          PHP_BIN=$(command -v php 2>/dev/null || true)
          [ -z "$PHP_BIN" ] && [ -x /usr/bin/php8.3 ] && PHP_BIN=/usr/bin/php8.3
          [ -z "$PHP_BIN" ] && [ -x /usr/bin/php8.1 ] && PHP_BIN=/usr/bin/php8.1
          [ -z "$PHP_BIN" ] && [ -x /usr/bin/php ] && PHP_BIN=/usr/bin/php
          if [ -z "$PHP_BIN" ]; then
            echo "ERROR: PHP not found. Ensure EC2 was provisioned with Terraform user_data (installs php8.3)."
            exit 1
          fi

          # Use Composer: system (from Terraform user_data) or composer.phar copied from runner
          if command -v composer >/dev/null 2>&1; then
            COMPOSER_CMD=composer
          elif [ -f composer.phar ]; then
            COMPOSER_CMD="$PHP_BIN composer.phar"
          else
            echo "ERROR: Composer not found and composer.phar was not copied."
            exit 1
          fi

          # .env: create from example if needed, then apply secrets (DB_CONNECTION=mysql required on server; Laravel defaults to sqlite otherwise)
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          grep -q '^DB_CONNECTION=' .env && sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env || echo 'DB_CONNECTION=mysql' >> .env
          sed -i 's/^DB_HOST=.*/DB_HOST=localhost/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i "s/^DB_DATABASE=.*/DB_DATABASE=${DB_DATABASE:-byu_590r_app}/" .env
          sed -i "s/^DB_USERNAME=.*/DB_USERNAME=${DB_USERNAME:-byu_user}/" .env
          sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=${DB_PASSWORD:-byu_password}/" .env
          sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env

          # Install PHP dependencies; if lock file targets PHP 8.4 (Symfony 8) but server has 8.3, run update
          set +e
          $COMPOSER_CMD install --no-interaction --no-scripts --prefer-dist --no-dev --optimize-autoloader
          EXIT=$?
          set -e
          if [ $EXIT -ne 0 ]; then
            $COMPOSER_CMD update --no-interaction --no-scripts --prefer-dist --no-dev --optimize-autoloader
          fi

          $PHP_BIN artisan key:generate --force 2>/dev/null || true
          $PHP_BIN artisan config:clear
          sudo mkdir -p storage/framework/{cache,sessions,views} storage/logs storage/app bootstrap/cache
          sudo chown -R ubuntu:www-data /var/www/html/api
          sudo chmod -R 775 storage bootstrap/cache
          echo "Backend deps and dirs done."
          REMOTE

      - name: Inject backend .env secrets
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "cd /var/www/html/api && \
            (grep -q '^DB_DATABASE=' .env && sed -i 's/^DB_DATABASE=.*/DB_DATABASE=${{ secrets.DB_DATABASE }}/' .env || echo 'DB_DATABASE=${{ secrets.DB_DATABASE }}' >> .env); \
            (grep -q '^DB_USERNAME=' .env && sed -i 's/^DB_USERNAME=.*/DB_USERNAME=${{ secrets.DB_USERNAME }}/' .env || echo 'DB_USERNAME=${{ secrets.DB_USERNAME }}' >> .env); \
            (grep -q '^DB_PASSWORD=' .env && sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/' .env || echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env); \
            (grep -q '^FILESYSTEM_DISK=' .env && sed -i 's/^FILESYSTEM_DISK=.*/FILESYSTEM_DISK=s3/' .env || echo 'FILESYSTEM_DISK=s3' >> .env); \
            (grep -q '^IMAGE_GENERATION_STORAGE_DISK=' .env && sed -i 's/^IMAGE_GENERATION_STORAGE_DISK=.*/IMAGE_GENERATION_STORAGE_DISK=s3/' .env || echo 'IMAGE_GENERATION_STORAGE_DISK=s3' >> .env); \
            (grep -q '^S3_BUCKET=' .env && sed -i 's|^S3_BUCKET=.*|S3_BUCKET=${{ secrets.S3_BUCKET }}|' .env || echo 'S3_BUCKET=${{ secrets.S3_BUCKET }}' >> .env); \
            (grep -q '^S3_BUCKET_PROD=' .env && sed -i 's|^S3_BUCKET_PROD=.*|S3_BUCKET_PROD=${{ secrets.S3_BUCKET }}|' .env || echo 'S3_BUCKET_PROD=${{ secrets.S3_BUCKET }}' >> .env); \
            (grep -q '^AWS_ACCESS_KEY_ID=' .env && sed -i 's/^AWS_ACCESS_KEY_ID=.*/AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}/' .env || echo 'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' >> .env); \
            (grep -q '^AWS_SECRET_ACCESS_KEY=' .env && sed -i 's/^AWS_SECRET_ACCESS_KEY=.*/AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}/' .env || echo 'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' >> .env); \
            (grep -q '^AWS_DEFAULT_REGION=' .env && sed -i 's/^AWS_DEFAULT_REGION=.*/AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}/' .env || echo 'AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}' >> .env); \
            # Optional mail + frontend URL secrets. Only overwrite if secrets are set so local/dev stays simple.
            ([ -z '${{ secrets.MAIL_MAILER }}' ] || (grep -q '^MAIL_MAILER=' .env && sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=${{ secrets.MAIL_MAILER }}/' .env || echo 'MAIL_MAILER=${{ secrets.MAIL_MAILER }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_HOST }}' ] || (grep -q '^MAIL_HOST=' .env && sed -i 's/^MAIL_HOST=.*/MAIL_HOST=${{ secrets.MAIL_HOST }}/' .env || echo 'MAIL_HOST=${{ secrets.MAIL_HOST }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_PORT }}' ] || (grep -q '^MAIL_PORT=' .env && sed -i 's/^MAIL_PORT=.*/MAIL_PORT=${{ secrets.MAIL_PORT }}/' .env || echo 'MAIL_PORT=${{ secrets.MAIL_PORT }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_USERNAME }}' ] || (grep -q '^MAIL_USERNAME=' .env && sed -i 's/^MAIL_USERNAME=.*/MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}/' .env || echo 'MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_PASSWORD }}' ] || (grep -q '^MAIL_PASSWORD=' .env && sed -i 's/^MAIL_PASSWORD=.*/MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}/' .env || echo 'MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_ENCRYPTION }}' ] || (grep -q '^MAIL_ENCRYPTION=' .env && sed -i 's/^MAIL_ENCRYPTION=.*/MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}/' .env || echo 'MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_FROM_ADDRESS }}' ] || (grep -q '^MAIL_FROM_ADDRESS=' .env && sed -i 's/^MAIL_FROM_ADDRESS=.*/MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}/' .env || echo 'MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}' >> .env)); \
            ([ -z '${{ secrets.MAIL_FROM_NAME }}' ] || (grep -q '^MAIL_FROM_NAME=' .env && sed -i 's/^MAIL_FROM_NAME=.*/MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}/' .env || echo 'MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}' >> .env)); \
            # FRONTEND_URL used in ForgotPassword links; default to http://EC2_HOST if not provided.
            ([ -z '${{ secrets.FRONTEND_URL }}' ] || (grep -q '^FRONTEND_URL=' .env && sed -i 's|^FRONTEND_URL=.*|FRONTEND_URL=${{ secrets.FRONTEND_URL }}|' .env || echo 'FRONTEND_URL=${{ secrets.FRONTEND_URL }}' >> .env)); \
            ([ -z '${{ secrets.APP_DEBUG }}' ] || (grep -q '^APP_DEBUG=' .env && sed -i 's/^APP_DEBUG=.*/APP_DEBUG=${{ secrets.APP_DEBUG }}/' .env || echo 'APP_DEBUG=${{ secrets.APP_DEBUG }}' >> .env)); \
            # Image generation config (application reads IMAGE_GENERATION_API_KEY)
            ([ -z '${{ secrets.IMAGE_GENERATION_PROVIDER }}' ] || (grep -q '^IMAGE_GENERATION_PROVIDER=' .env && sed -i 's|^IMAGE_GENERATION_PROVIDER=.*|IMAGE_GENERATION_PROVIDER=${{ secrets.IMAGE_GENERATION_PROVIDER }}|' .env || echo 'IMAGE_GENERATION_PROVIDER=${{ secrets.IMAGE_GENERATION_PROVIDER }}' >> .env)); \
            ([ -z '${{ secrets.IMAGE_GENERATION_API_KEY }}' ] || (grep -q '^IMAGE_GENERATION_API_KEY=' .env && sed -i 's|^IMAGE_GENERATION_API_KEY=.*|IMAGE_GENERATION_API_KEY=${{ secrets.IMAGE_GENERATION_API_KEY }}|' .env || echo 'IMAGE_GENERATION_API_KEY=${{ secrets.IMAGE_GENERATION_API_KEY }}' >> .env)); \
            ([ -n '${{ secrets.IMAGE_GENERATION_API_KEY }}' ] || [ -z '${{ secrets.OPENAI_API_KEY }}' ] || (grep -q '^IMAGE_GENERATION_API_KEY=' .env && sed -i 's|^IMAGE_GENERATION_API_KEY=.*|IMAGE_GENERATION_API_KEY=${{ secrets.OPENAI_API_KEY }}|' .env || echo 'IMAGE_GENERATION_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env)); \
            ([ -z '${{ secrets.OPENAI_API_KEY }}' ] || (grep -q '^OPENAI_API_KEY=' .env && sed -i 's|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|' .env || echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env)); \
            true"

      - name: Set PHP upload limits on server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} 'set -e
          # Patch main php.ini files (FPM and Apache) so upload limits apply
          for f in /etc/php/8.3/fpm/php.ini /etc/php/8.3/apache2/php.ini /etc/php/8.2/fpm/php.ini /etc/php/8.2/apache2/php.ini /etc/php/8.1/fpm/php.ini /etc/php/8.1/apache2/php.ini; do
            if [ -f "$f" ]; then
              sudo sed -i "s/^;\? *upload_max_filesize.*/upload_max_filesize = 10M/" "$f"
              sudo sed -i "s/^;\? *post_max_size.*/post_max_size = 12M/" "$f"
              sudo grep -q "^upload_max_filesize" "$f" || echo "upload_max_filesize = 10M" | sudo tee -a "$f" > /dev/null
              sudo grep -q "^post_max_size" "$f" || echo "post_max_size = 12M" | sudo tee -a "$f" > /dev/null
              echo "Patched $f"
            fi
          done
          for svc in php8.3-fpm php8.2-fpm php8.1-fpm; do
            if systemctl is-active --quiet $svc 2>/dev/null; then
              sudo systemctl restart $svc && echo "Restarted $svc"
              break
            fi
          done
          (sudo systemctl restart apache2 || sudo systemctl reload apache2 || true) && echo "Apache restarted/reloaded"'

      - name: Migrate and restart backend
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'REMOTE'
          set -e
          export PATH="/usr/bin:/usr/local/bin:$PATH"
          cd /var/www/html/api

          # Ensure Apache can proxy websocket upgrades to Reverb on localhost:8080.
          sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite >/dev/null 2>&1 || true

          sudo tee /etc/apache2/sites-available/byu-590r-backend.conf > /dev/null <<'APACHE_BACKEND_EOF'
          <VirtualHost *:4444>
            ServerName localhost
            DocumentRoot /var/www/html/api/public

            # Proxy Reverb websocket endpoint used by Pusher protocol (/app/{key}).
            ProxyPreserveHost On
            ProxyPass /app ws://127.0.0.1:8080/app
            ProxyPassReverse /app ws://127.0.0.1:8080/app

            <Directory /var/www/html/api/public>
              AllowOverride All
              Require all granted

              RewriteEngine On
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule ^(.*)$ index.php [QSA,L]

              DirectoryIndex index.php index.html
            </Directory>

            ErrorLog ${APACHE_LOG_DIR}/byu590r_backend_error.log
            CustomLog ${APACHE_LOG_DIR}/byu590r_backend_access.log combined
          </VirtualHost>
          APACHE_BACKEND_EOF

          sudo a2ensite byu-590r-backend.conf >/dev/null 2>&1 || true

          php artisan config:clear
          php artisan migrate --force
          php artisan migrate --seed --force 2>/dev/null || true
          sudo systemctl restart apache2

          # Instances created before the Terraform systemd unit existed won't have `reverb.service`.
          # Create/overwrite it on every deploy so realtime works without manual server steps.
          sudo tee /etc/systemd/system/reverb.service > /dev/null <<'SERVICE'
          [Unit]
          Description=Laravel Reverb WebSocket server
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/var/www/html/api
          ExecStart=/bin/sh -c 'PHP_BIN="$(command -v php8.3 || command -v php)" && exec "$PHP_BIN" artisan reverb:start --host=0.0.0.0 --port=8080'
          Restart=always
          RestartSec=3
          User=ubuntu

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable reverb --now || sudo systemctl restart reverb || true
          REMOTE

      - name: Deploy frontend
        run: |
          # Inject Terraform-generated EC2 host into production environment (from GitHub secret EC2_HOST)
          sed -i "s|__EC2_HOST__|${{ secrets.EC2_HOST }}|g" web-app/src/environments/environment.prod.ts
          cd web-app
          npm install
          npm run build

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "sudo mkdir -p /var/www/html/app && sudo chown -R ubuntu:ubuntu /var/www/html/app"
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
            dist/byu-590r-builder/ ubuntu@${{ secrets.EC2_HOST }}:/var/www/html/app/
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "sudo chown -R www-data:www-data /var/www/html/app && sudo systemctl reload apache2"

      - name: Verify
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "curl -s -o /dev/null -w '%{http_code}' http://localhost/ && echo ' Frontend' && curl -s -o /dev/null -w '%{http_code}' http://localhost:4444/api/hello && echo ' Backend'"

  test-deployment:
    name: Post-deploy tests
    needs: [deploy-to-ec2]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm install -D @playwright/test @types/node && npx playwright install --with-deps chromium
      - name: Run Playwright
        env:
          BACKEND_URL: http://${{ secrets.EC2_HOST }}:4444
          FRONTEND_URL: http://${{ secrets.EC2_HOST }}
        run: npx playwright test --reporter=list,html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-complete:
    name: Done
    needs: [test-deployment]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - run: |
          echo "Frontend http://${{ secrets.EC2_HOST }}"
          echo "Backend  http://${{ secrets.EC2_HOST }}:4444/api/hello"
